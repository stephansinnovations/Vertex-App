<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: light; }
    body { width: 320px; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #0f1111; }
    .hdr { display: flex; align-items: center; gap: 8px; padding: 14px 16px 10px; }
    .hdr h1 { font-size: 15px; font-weight: 700; margin: 0; }
    .dot { width: 18px; height: 18px; border-radius: 50%; background: radial-gradient(circle at 35% 28%, #d2a0ff, #6d28d9); }
    .add { display: block; width: calc(100% - 32px); margin: 0 16px 8px; padding: 11px; border: 0; border-radius: 999px; background: #FFD814; color: #0F1111; font-size: 14px; font-weight: 700; cursor: pointer; }
    .add:hover { background: #F7CA00; }
    .add:disabled { opacity: .5; cursor: default; }
    .url { font-size: 11px; color: #6b7280; padding: 0 16px 10px; word-break: break-all; }
    .msg { font-size: 12px; padding: 0 16px 8px; }
    .msg.ok { color: #15803d; }
    .msg.err { color: #dc2626; }
    .sect { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #9ca3af; padding: 8px 16px 4px; border-top: 1px solid #f0f0f0; }
    .list { max-height: 220px; overflow-y: auto; padding: 0 8px 10px; }
    .item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; }
    .item:hover { background: #f9fafb; }
    .item .t { flex: 1; min-width: 0; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; flex-shrink: 0; }
    .b-pending { background: #fef3c7; color: #92400e; }
    .b-processing { background: #ede9fe; color: #5b21b6; }
    .b-done { background: #dcfce7; color: #166534; }
    .b-error { background: #fee2e2; color: #991b1b; }
    .empty { font-size: 12px; color: #9ca3af; padding: 8px 16px 14px; }
    .foot { padding: 8px 16px 14px; font-size: 11px; color: #9ca3af; }
    .foot a { color: #146EB4; }
  </style>
</head>
<body>
  <div class="hdr"><span class="dot"></span><h1>Vertex Parts Queue</h1></div>
  <div class="url" id="url">…</div>
  <button class="add" id="add">＋ Add this page to queue</button>
  <div class="msg" id="msg"></div>

  <div class="sect">Queue</div>
  <div class="list" id="list"><div class="empty">Loading…</div></div>

  <div class="foot">Open the Parts Library and press <b>Start</b> to process the queue.</div>
  <script src="popup.js"></script>
</body>
</html>
